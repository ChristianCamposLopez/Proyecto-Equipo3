version: '3.8'

services:
  # 1. Contenedor del Sistema de Pedidos (Frontend y Backend)
  web:
    build: .
    # Permisos inteligentes: solo a la raíz y package.json para evitar lentitud
    command: sh -c "chmod 777 . package.json && npm run dev"
    ports:
      - "3000:3000"
    environment:
      # Variables de conexión a la BD (coinciden con config/db.ts)
      - DB_HOST=db
      - DB_USER=postgres
      - DB_PASSWORD=password_secreto
      - DB_NAME=restaurante_bd
      - DB_PORT=5432
      # Clave secreta para JWT (US010.2)
      - JWT_SECRET=clave_jwt_restaurante_eq3_2026
    volumes:
      - .:/app:z
      - /app/node_modules
      - /app/.next
    depends_on:
      db:
        condition: service_healthy

  # 2. Contenedor de la Base de Datos (Persistencia)
  db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password_secreto
      - POSTGRES_DB=proyecto_equipo3
    volumes:
      # Esto asegura que los platos, pedidos y usuarios no se borren si apagan Docker
      - pg_data:/var/lib/postgresql/data
      # Autocarga de las tablas del Sprint 2
      - ./bd/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  pg_data:
