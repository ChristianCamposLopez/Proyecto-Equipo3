services:
  # 1. Contenedor del Sistema de Pedidos (Frontend y Backend)
  web:
    build: .
    # Permisos inteligentes: solo a la raíz y package.json para evitar lentitud
    command: sh -c "chmod 777 . package.json && node scripts/sync_db.js && npm run dev"
    ports:
      - "3000:3000"
    environment:
      # Variables de conexión a la BD (coinciden con config/db.ts)
      - DB_HOST=db
      - DB_USER=postgres
      - DB_PASSWORD=password_secreto
      - DB_NAME=restaurante_bd
      - DB_PORT=5432
    volumes:
      - .:/app:z
      - /app/node_modules
      - /app/.next
    depends_on:
      db:
        condition: service_healthy

  # 2. Contenedor de la Base de Datos (Persistencia)
  db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password_secreto
      - POSTGRES_DB=restaurante_bd
    volumes:
      # Persistencia de datos
      - pg_data:/var/lib/postgresql/data
      # Autocarga del esquema y datos iniciales (Orden alfabético: 01_init, 02_seed)
      - ./bd/init.sql:/docker-entrypoint-initdb.d/01_init.sql:z
      - ./bd/seed_test_ivan.sql:/docker-entrypoint-initdb.d/02_seed.sql:z
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "psql -U postgres -d restaurante_bd -c 'SELECT 1 FROM users LIMIT 1;'",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

volumes:
  pg_data:
